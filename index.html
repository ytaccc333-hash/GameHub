<!DOCTYPE html>
<html>
<head>
  <title>HomeJPageY</title>

  <!-- Firebase (IMPORTANT) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="box">
    <h2>Authorization</h2>

    <input id="codeInput" placeholder="Enter code">
    <button onclick="checkCode()">Enter</button>

    <p id="error"></p>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen" class="screen">

  <div class="menu">

    <div class="topbar">
      <input id="search" placeholder="Search..." onkeyup="searchLinks()">
      <button onclick="openAdmin()">Admin Panel</button>
    </div>

    <div class="tabs">
      <button onclick="showTab('games')">Unblocked Games</button>
      <button onclick="showTab('sites')">Websites</button>
    </div>

    <div id="games" class="tab active">
      <h2>Unblocked Games</h2>
      <div class="scroll" id="gamesList"></div>
    </div>

    <div id="sites" class="tab">
      <h2>Websites</h2>
      <div class="scroll" id="sitesList"></div>
    </div>

  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div class="menu">
    <h2>Admin Panel</h2>

    <div class="tab active">
      <h3>Admin Tools</h3>
      <p>Nothing here yet</p>
    </div>

    <button onclick="closeAdmin()">Back</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
