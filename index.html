<!DOCTYPE html>
<html>
<head>
  <title>HomeJPageY</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen active">
  <div class="box">
    <h2>Authorization</h2>

    <input type="text" id="codeInput" placeholder="Enter code">
    <button onclick="checkCode()">Enter</button>

    <p id="error"></p>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="mainScreen" class="screen">

  <div class="menu">

    <div class="topbar">
      <input id="search" placeholder="Search..." onkeyup="searchLinks()">
      <button onclick="openAdmin()">Admin Panel</button>
    </div>

    <div class="tabs">
      <button onclick="showTab('games')">Unblocked Games</button>
      <button onclick="showTab('sites')">Websites</button>
    </div>

    <div id="games" class="tab active">
      <h2>Unblocked Games</h2>
      <div class="scroll">
        <a href="https://solvecalc.net/" target="_blank">Unblocked Game 1</a>
        <a href="https://games.macrolorblx.com/" target="_blank">Unblocked Game 2</a>
        <a href="https://sites.google.com/view/unblocked-game76" target="_blank">Unblocked Game 3</a>
        <a href="https://duckmath.org/" target="_blank">Unblocked Game 4</a>
        <a href="https://www.coolmathgames.com/" target="_blank">Unblocked Game 5</a>
      </div>
    </div>

    <div id="sites" class="tab">
      <h2>Websites</h2>
      <div class="scroll">
        <a href="https://www.edutoolslab.com/" target="_blank">Study Tools</a>
        <a href="https://www.youtube.com" target="_blank">YouTube (No Ads)</a>
      </div>
    </div>

  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="adminScreen" class="screen">

  <div class="menu">

    <div class="tabs">
      <button onclick="showAdminTab('tools')">Admin Tools</button>
    </div>

    <div id="tools" class="tab active">
      <h2>Admin Tools</h2>
      <p>Nothing here yet.</p>
    </div>

    <button onclick="closeAdmin()">Back</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
