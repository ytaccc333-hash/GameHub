<!DOCTYPE html>
<html>
<head>
  <title>HomeJPageY</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="box">
    <h2>Authorization</h2>

    <input id="codeInput" placeholder="Enter code">
    <button onclick="checkCode()">Enter</button>

    <p id="error"></p>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen" class="screen">

  <div class="menu">

    <div class="topbar">
      <input id="search" placeholder="Search..." onkeyup="searchLinks()">
      <button onclick="openAdmin()">Admin Panel</button>
    </div>

    <div class="tabs">
      <button onclick="showTab('games')">Unblocked Games</button>
      <button onclick="showTab('sites')">Websites</button>
    </div>

    <!-- GAMES -->
    <div id="games" class="tab active">
      <h2>Unblocked Games</h2>
      <div class="scroll" id="gamesList">

        <a href="https://solvecalc.net/" target="_blank">GAME</a>
        <a href="https://games.macrolorblx.com/" target="_blank">Macrolorblx Games</a>
        <a href="https://sites.google.com/view/unblocked-game76" target="_blank">Unblocked Game 76</a>
        <a href="https://duckmath.org/" target="_blank">Duck Math</a>
        <a href="https://www.coolmathgames.com/" target="_blank">Cool Math Games</a>
        <a href="https://www.poki.com/" target="_blank">Poki</a>

      </div>
    </div>

    <!-- SITES -->
    <div id="sites" class="tab">
      <h2>Websites</h2>
      <div class="scroll" id="sitesList">

        <a href="https://www.youtube.com" target="_blank">YouTube</a>
        <a href="https://www.google.com" target="_blank">Google</a>
        <a href="https://www.wikipedia.org" target="_blank">Wikipedia</a>

      </div>
    </div>

  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="screen">
  <div class="menu">

    <h2>Admin Panel</h2>

    <div class="tabs">
      <button onclick="adminTab('addGame')">Add Game</button>
      <button onclick="adminTab('addSite')">Add Website</button>
    </div>

    <!-- ADD GAME -->
    <div id="addGame" class="tab active">
      <h3>Add Game</h3>

      <input id="gameName" placeholder="Game name">
      <input id="gameURL" placeholder="Game URL">

      <button onclick="addGame()">Add Game</button>
    </div>

    <!-- ADD WEBSITE -->
    <div id="addSite" class="tab">
      <h3>Add Website</h3>

      <input id="siteName" placeholder="Site name">
      <input id="siteURL" placeholder="Site URL">

      <button onclick="addSite()">Add Website</button>
    </div>

    <button onclick="closeAdmin()">Back</button>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
