<!DOCTYPE html>
<html>
<head>
  <title>HomeJPageY</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen" class="screen active">
  <div class="box">
    <h2>Authorization</h2>

    <input id="codeInput" placeholder="Enter code">
    <button onclick="checkCode()">Enter</button>

    <p id="error"></p>
  </div>
</div>

<!-- ================= MAIN ================= -->
<div id="mainScreen" class="screen">

  <div class="menu">

    <!-- TOP BAR -->
    <div class="topbar">
      <input id="search" placeholder="Search..." onkeyup="searchLinks()">
      <button onclick="openAdmin()">Admin Panel</button>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button onclick="showTab('games')">Unblocked Games</button>
      <button onclick="showTab('sites')">Websites</button>
    </div>

    <!-- GAMES -->
    <div id="games" class="tab active">
      <h2>Unblocked Games</h2>
      <div class="scroll" id="gamesList"></div>
    </div>

    <!-- SITES -->
    <div id="sites" class="tab" style="display:none;">
      <h2>Websites</h2>
      <div class="scroll" id="sitesList"></div>
    </div>

  </div>
</div>

<!-- ================= ADMIN PANEL ================= -->
<div id="adminScreen" class="screen">

  <div class="menu">

    <h2>Admin Panel</h2>

    <div class="tabs">
      <button onclick="adminTab('addGame')">Add Game</button>
      <button onclick="adminTab('addSite')">Add Website</button>
      <button onclick="clearSearch()">Clear Search</button>
      <button onclick="reloadData()">Reload</button>
    </div>

    <!-- ADD GAME -->
    <div id="addGame" class="adminTab">
      <h3>Add Game</h3>

      <input id="gameName" placeholder="Game name">
      <input id="gameURL" placeholder="Game URL">

      <button onclick="addGame()">Add Game</button>
    </div>

    <!-- ADD WEBSITE -->
    <div id="addSite" class="adminTab" style="display:none;">
      <h3>Add Website</h3>

      <input id="siteName" placeholder="Site name">
      <input id="siteURL" placeholder="Site URL">

      <button onclick="addSite()">Add Website</button>
    </div>

    <button onclick="closeAdmin()">Close Admin</button>

  </div>
</div>

<!-- ================= ADMIN POPUP ================= -->
<div id="adminPopup" class="popup hidden">
  <div class="popupBox">

    <h2>Admin Access</h2>

    <input id="adminCodeInput" placeholder="Enter admin code">

    <button onclick="checkAdminCode()">Enter</button>
    <button onclick="closeAdminPopup()">Cancel</button>

    <p id="adminError"></p>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
